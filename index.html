<!DOCTYPE html>
<html lang="sk">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delfondash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;

        >
    </div>

</body>
</html>
