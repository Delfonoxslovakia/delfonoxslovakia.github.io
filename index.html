<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delfonox Slovakia</title>
    
    <!-- Ikona v tabe prehliadača (Favicon) -->
    <link rel="icon" type="image/png" href="wbsitelogo.png">
    <!-- Ikona pre mobilné zariadenia (Apple) -->
    <link rel="apple-touch-icon" href="wbsitelogo.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Horizontálne v strede */
            align-items: flex-start; /* Umiestnenie na začiatok (hore) */
            min-height: 100vh;
            
            /* Modrý filter nad obrázkom pozadia */
            background: 
                linear-gradient(rgba(0, 102, 255, 0.7), rgba(0, 102, 255, 0.7)), 
                url('gdbackround.png');
            
            background-color: #0066ff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .logo-container {
            margin-top: 30px; /* Odstup loga od úplného vrchu */
            display: flex;
            justify-content: center;
            width: 100%;
            z-index: 10;
        }

        img {
            max-width: 80%;
            height: auto;
            /* Jemný tieň pod logom */
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logodelfondash.png" alt="Logo Delfondash" onerror="this.style.border='2px dashed white';">
    </div>

</body>
</html>
