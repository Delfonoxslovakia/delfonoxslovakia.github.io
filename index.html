<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delfonox Slovakia</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            
            /* Lineárny prechod vytvorí modrý filter nad obrázkom */
            background: 
                linear-gradient(rgba(0, 102, 255, 0.7), rgba(0, 102, 255, 0.7)), 
                url('gdbackround.png');
            
            background-color: #0066ff; /* Záložná modrá */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .logo-container {
            margin-top: 50px;
            text-align: center;
            z-index: 10;
        }

        img {
            max-width: 80%; /* Trochu som zmenšil logo, aby lepšie vyniklo */
            height: auto;
            display: block;
            /* Jemný tieň pod logom, aby "vyskočilo" z pozadia */
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logodelfondash.png" alt="Logo Delfondash" onerror="this.style.border='2px solid white'; console.log('Logo nenájdené');">
    </div>

</body>
</html>
